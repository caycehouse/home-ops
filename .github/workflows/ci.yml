name: Deploy with Ansible

on:
  push:
    branches:
      - main

concurrency: ci

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out source code
        uses: actions/checkout@c85c95e3d7251135ab7dc9ce3241c5835cc595a9 # v3.5.3
      - name: Tailscale
        uses: tailscale/github-action@cc6818dd6930277a6e4b5d249e32ba2f4cf6ea32 # v1
        with:
          oauth_client_id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth_secret: ${{ secrets.TS_OAUTH_SECRET }}
          oauth_tags: tag:server,tag:ssh
          version: 1.40.0
      - name: Run playbook
        uses: dawidd6/action-ansible-playbook@5d970176ea4bfd99a3f5004d48e293fe0994eda1 # v2.6.1
        with:
          playbook: site.yml
          requirements: requirements.yml
          vault_password: ${{secrets.VAULT_PASSWORD}}
