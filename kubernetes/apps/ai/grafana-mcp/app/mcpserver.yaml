---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/litellm.home-operations.com/litellmmcpserver_v1alpha1.json
apiVersion: litellm.home-operations.com/v1alpha1
kind: LiteLLMMCPServer
metadata:
  name: grafana-mcp
spec:
  alias: grafana
  transport: http
  workload:
    image: grafana/mcp-grafana@sha256:c99c0a0fdb68e2fd8a9a0f0f42014cfc316deb92847472df7e9447c3f5bb2710
    args: ["-t", "streamable-http", "--address", ":8000", "--disable-write", "--disable-admin"]
    port: 8000
    path: /mcp
    env:
      - name: GRAFANA_URL
        value: https://grafana.housefam.casa
    resources:
      requests:
        cpu: 10m
      limits:
        memory: 256Mi
    securityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      capabilities:
        drop: ["ALL"]
    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000
      fsGroupChangePolicy: OnRootMismatch
