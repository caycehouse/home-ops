---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/litellm.home-operations.com/litellmmcpserver_v1alpha1.json
apiVersion: litellm.home-operations.com/v1alpha1
kind: LiteLLMMCPServer
metadata:
  name: grafana-mcp
spec:
  alias: grafana
  transport: http
  workload:
    image: grafana/mcp-grafana@sha256:aae3a28e50c14783dc50ec3deb99c0f5b117d395ef8e4e17003543b05b0e489b
    args:
      [
        "-t",
        "streamable-http",
        "--address",
        ":8000",
        "--disable-write",
        "--disable-admin",
        "--allowed-hosts",
        "grafana-mcp.ai.svc.cluster.local:8000",
      ]
    port: 8000
    path: /mcp
    env:
      - name: GRAFANA_URL
        value: https://grafana.housefam.casa
      - name: GRAFANA_SERVICE_ACCOUNT_TOKEN
        valueFrom:
          secretKeyRef:
            name: grafana-mcp-secret
            key: GRAFANA_SERVICE_ACCOUNT_TOKEN
    resources:
      requests:
        cpu: 10m
      limits:
        memory: 256Mi
    securityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      capabilities:
        drop: ["ALL"]
    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000
      fsGroupChangePolicy: OnRootMismatch
