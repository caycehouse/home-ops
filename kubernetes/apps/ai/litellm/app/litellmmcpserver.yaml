---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/litellm.home-operations.com/litellmmcpserver_v1alpha1.json
apiVersion: litellm.home-operations.com/v1alpha1
kind: LiteLLMMCPServer
metadata:
  name: ha-mcp
spec:
  alias: ha_mcp
  proxyRef: litellm
  transport: http
  workload:
    image: ghcr.io/homeassistant-ai/ha-mcp:7.12.0@sha256:35bb71038396576a1ba15ccf76136d3f868206809aeee75153cff57c27f762fb
    command: ["ha-mcp-web"]
    port: 8080
    path: /mcp
    env:
      - name: HOMEASSISTANT_URL
        value: http://home-assistant.default.svc.cluster.local:8123
      - name: MCP_PORT
        value: "8080"
      - name: TZ
        value: America/New_York
      - name: HOMEASSISTANT_TOKEN
        valueFrom:
          secretKeyRef:
            name: ha-mcp-secret
            key: HOMEASSISTANT_TOKEN
    resources:
      requests:
        cpu: 10m
      limits:
        memory: 512Mi
    securityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      capabilities:
        drop: ["ALL"]
    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000
      fsGroupChangePolicy: OnRootMismatch
    volumeMounts:
      - name: tmp
        mountPath: /tmp
    volumes:
      - name: tmp
        emptyDir: {}
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/litellm.home-operations.com/litellmmcpserver_v1alpha1.json
apiVersion: litellm.home-operations.com/v1alpha1
kind: LiteLLMMCPServer
metadata:
  name: konflate
spec:
  alias: konflate
  proxyRef: litellm
  transport: http
  url: http://konflate.flux-system.svc.cluster.local:8080/mcp
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/litellm.home-operations.com/litellmmcpserver_v1alpha1.json
apiVersion: litellm.home-operations.com/v1alpha1
kind: LiteLLMMCPServer
metadata:
  name: actual-mcp
spec:
  alias: actual_mcp
  proxyRef: litellm
  transport: http
  authType: bearer_token
  authTokenRef:
    name: actual-mcp-secret
    key: MCP_SSE_AUTHORIZATION
  workload:
    image: ghcr.io/agigante80/actual-mcp-server:0.8.9@sha256:0712f3b85e6cc2c42784d3f150648a06152fffb9463c31df85596e186e6ad81b
    port: 3600
    path: /http
    env:
      - name: ACTUAL_SERVER_URL
        value: http://actual.default.svc.cluster.local
      - name: MCP_BRIDGE_PORT
        value: "3600"
      - name: MCP_BRIDGE_DATA_DIR
        value: /app/data
      - name: ACTUAL_PASSWORD
        valueFrom:
          secretKeyRef:
            name: actual-mcp-secret
            key: ACTUAL_PASSWORD
      - name: ACTUAL_BUDGET_SYNC_ID
        valueFrom:
          secretKeyRef:
            name: actual-mcp-secret
            key: ACTUAL_BUDGET_SYNC_ID
      - name: MCP_SSE_AUTHORIZATION
        valueFrom:
          secretKeyRef:
            name: actual-mcp-secret
            key: MCP_SSE_AUTHORIZATION
    resources:
      requests:
        cpu: 10m
      limits:
        memory: 512Mi
    securityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      capabilities:
        drop: ["ALL"]
    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000
      fsGroupChangePolicy: OnRootMismatch
    volumeMounts:
      - name: data
        mountPath: /app/data
      - name: tmp
        mountPath: /tmp
    volumes:
      - name: data
        emptyDir: {}
      - name: tmp
        emptyDir: {}
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/litellm.home-operations.com/litellmmcpserver_v1alpha1.json
apiVersion: litellm.home-operations.com/v1alpha1
kind: LiteLLMMCPServer
metadata:
  name: flux-operator-mcp
spec:
  alias: flux
  proxyRef: litellm
  transport: http
  url: http://flux-operator-mcp.flux-system.svc.cluster.local:9090/mcp
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/litellm.home-operations.com/litellmmcpserver_v1alpha1.json
apiVersion: litellm.home-operations.com/v1alpha1
kind: LiteLLMMCPServer
metadata:
  name: grafana-mcp
spec:
  alias: grafana
  proxyRef: litellm
  transport: http
  workload:
    image: grafana/mcp-grafana@sha256:c99c0a0fdb68e2fd8a9a0f0f42014cfc316deb92847472df7e9447c3f5bb2710
    args: ["-t", "streamable-http", "--address", ":8000", "--disable-write", "--disable-admin"]
    port: 8000
    path: /mcp
    env:
      - name: GRAFANA_URL
        value: https://grafana.housefam.casa
    resources:
      requests:
        cpu: 10m
      limits:
        memory: 256Mi
    securityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      capabilities:
        drop: ["ALL"]
    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000
      fsGroupChangePolicy: OnRootMismatch
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/litellm.home-operations.com/litellmmcpserver_v1alpha1.json
apiVersion: litellm.home-operations.com/v1alpha1
