---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/litellm.home-operations.com/litellmproxy_v1alpha1.json
apiVersion: litellm.home-operations.com/v1alpha1
kind: LiteLLMProxy
metadata:
  name: litellm
spec:
  image: ghcr.io/berriai/litellm:v1.94.0-rc.1@sha256:0f0a2e85b3771af16074117d9054cc43830f27d20ef7a0fa7908594f59a8dbc0
  generalSettings:
    health_check_endpoint: /v1/health
  envFrom:
    - secretRef:
        name: litellm-secret
  route:
    hostnames:
      - litellm.housefam.casa
    parentRefs:
      - name: envoy-internal
        namespace: network
  resources:
    requests:
      cpu: 25m
    limits:
      memory: 4Gi
