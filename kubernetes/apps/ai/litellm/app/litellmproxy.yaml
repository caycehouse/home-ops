---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/litellm.home-operations.com/litellmproxy_v1alpha1.json
apiVersion: litellm.home-operations.com/v1alpha1
kind: LiteLLMProxy
metadata:
  name: litellm
spec:
  image: ghcr.io/berriai/litellm:v1.92.0@sha256:9ef6f45bc0104940571765e610c52a1d761b5ec85efcd193795281086ee61277
  generalSettings:
    health_check_endpoint: /v1/health
  envFrom:
    - secretRef:
        name: litellm-secret
  route:
    hostnames:
      - litellm.housefam.casa
    parentRefs:
      - name: envoy-internal
        namespace: network
  resources:
    requests:
      cpu: 25m
    limits:
      memory: 4Gi
