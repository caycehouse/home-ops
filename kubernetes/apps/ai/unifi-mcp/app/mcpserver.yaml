---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/litellm.home-operations.com/litellmmcpserver_v1alpha1.json
apiVersion: litellm.home-operations.com/v1alpha1
kind: LiteLLMMCPServer
metadata:
  name: unifi-mcp
spec:
  alias: unifi_mcp
  transport: http
  workload:
    image: ghcr.io/sirkirby/unifi-network-mcp:0.24.1@sha256:4d15874fa5ec0c028bd2557d8725d22a831dadfa28d87987c49be91bb20245ee
    port: 3000
    path: /mcp
    env:
      - name: TZ
        value: America/New_York
      - name: HOME
        value: /tmp
      - name: UNIFI_HOST
        value: "192.168.1.1"
      - name: UNIFI_PORT
        value: "443"
      - name: UNIFI_VERIFY_SSL
        value: "false"
      - name: UNIFI_MCP_HTTP_ENABLED
        value: "true"
      - name: UNIFI_MCP_HTTP_TRANSPORT
        value: streamable-http
      - name: UNIFI_MCP_HOST
        value: "0.0.0.0"
      - name: UNIFI_MCP_PORT
        value: "3000"
      # In-cluster east-west traffic only; the LiteLLM proxy reaches this over
      # the pod service DNS, which the default host allowlist would reject.
      - name: UNIFI_MCP_ENABLE_DNS_REBINDING_PROTECTION
        value: "false"
      - name: LOG_FORMAT
        value: json
      - name: UNIFI_USERNAME
        valueFrom:
          secretKeyRef:
            name: unifi-mcp-secret
            key: UNIFI_USERNAME
      - name: UNIFI_PASSWORD
        valueFrom:
          secretKeyRef:
            name: unifi-mcp-secret
            key: UNIFI_PASSWORD
    resources:
      requests:
        cpu: 10m
      limits:
        memory: 512Mi
    securityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      capabilities:
        drop: ["ALL"]
    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000
      fsGroupChangePolicy: OnRootMismatch
    volumeMounts:
      - name: tmp
        mountPath: /tmp
    volumes:
      - name: tmp
        emptyDir: {}
