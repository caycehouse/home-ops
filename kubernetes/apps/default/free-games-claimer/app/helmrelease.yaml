---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: free-games-claimer
spec:
  chartRef:
    kind: OCIRepository
    name: free-games-claimer
  interval: 1h
  values:
    controllers:
      free-games-claimer:
        type: cronjob
        cronjob:
          timeZone: America/New_York
          schedule: "0 12 * * *"
          backoffLimit: 0
          activeDeadlineSeconds: 600
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/p-adamiec/free-games-claimer
              tag: enhanced@sha256:a5ceacc4dd35dcbbf48a65b6de178a14567086c97bc0c1e787cf4cff5c2493b4
            env:
              NOVNC_PORT: &port 80
              PG_REDEEM: 1
              PG_CLAIMDLC: 1
              WIDTH: 1920
              HEIGHT: 1080
            envFrom:
              - secretRef:
                  name: "{{ .Release.Name }}-secret"
            args:
              - "bash"
              - "-c"
              - |
                node epic-games;
                node prime-gaming;
                node gog;
            resources:
              requests:
                cpu: 100m
              limits:
                memory: 2Gi
    defaultPodOptions:
      hostUsers: false
    service:
      app:
        ports:
          http:
            port: *port
    route:
      app:
        hostnames:
          - fgc.housefam.casa
        parentRefs:
          - name: envoy-internal
            namespace: network
    persistence:
      config:
        existingClaim: "{{ .Release.Name }}"
        globalMounts:
          - path: /fgc/data
