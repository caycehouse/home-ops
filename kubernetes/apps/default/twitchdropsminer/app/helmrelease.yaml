---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: twitchdropsminer
spec:
  chartRef:
    kind: OCIRepository
    name: twitchdropsminer
  interval: 1h
  values:
    controllers:
      twitchdropsminer:
        containers:
          app:
            image:
              repository: mirror.gcr.io/dungfu/twitch-drops-miner
              tag: latest@sha256:f9c274b73176801a788e07ad389a3c83a63691e93f403ea2959491d902562b2b
            env:
              TZ: America/New_York
              WEBUI_PORT: &port 80
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 10
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 1Gi
    defaultPodOptions:
      hostUsers: false
    service:
      app:
        ports:
          http:
            port: *port
    route:
      app:
        hostnames:
          - "{{ .Release.Name }}.housefam.casa"
        parentRefs:
          - name: envoy-internal
            namespace: network
    persistence:
      data:
        existingClaim: "{{ .Release.Name }}"
        globalMounts:
          - path: /TwitchDropsMiner/config
      cache:
        existingClaim: "{{ .Release.Name }}-cache"
        globalMounts:
          - path: /TwitchDropsMiner/cache
