---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: flux-operator-mcp
spec:
  chartRef:
    kind: OCIRepository
    name: flux-operator-mcp
  interval: 1h
  values:
    transport: http
    readonly: true
    networkPolicy:
      ingress:
        namespaces: [ai]
    rbac:
      create: false
    serviceAccount:
      create: false
      name: flux-operator-mcp
    resources:
      requests:
        cpu: 10m
        memory: 64Mi
      limits:
        memory: 256Mi
