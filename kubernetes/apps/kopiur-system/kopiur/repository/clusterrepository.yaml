---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kopiur.home-operations.com/clusterrepository_v1alpha1.json
apiVersion: kopiur.home-operations.com/v1alpha1
kind: ClusterRepository
metadata:
  name: s3
spec:
  allowedNamespaces:
    all: true
  backend:
    s3:
      bucket: kopiur
      endpoint: c209b8f45f329955b3e0d469af82a4e4.r2.cloudflarestorage.com
      auth:
        secretRef:
          name: kopiur-s3-secret
  encryption:
    passwordSecretRef:
      name: kopiur-s3-secret
      namespace: kopiur-system
      key: KOPIA_PASSWORD
  moverDefaults:
    cache:
      capacity: 1Mi
      mode: Ephemeral
      storageClassName: openebs-hostpath
    podSecurityContext:
      fsGroup: 1000
      fsGroupChangePolicy: OnRootMismatch
    scratch:
      capacity: 1Mi
      storageClassName: openebs-hostpath
    securityContext:
      runAsUser: 1000
      runAsGroup: 1000
    ttlSecondsAfterFinished: 300
  scheduleDefaults:
    timezone: America/New_York
