---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kopiur.home-operations.com/clusterrepository_v1alpha1.json
apiVersion: kopiur.home-operations.com/v1alpha1
kind: ClusterRepository
metadata:
  name: s3
spec:
  backend:
    s3:
      bucket: kopiur
      endpoint: c209b8f45f329955b3e0d469af82a4e4.r2.cloudflarestorage.com
      auth:
        secretRef:
          name: kopiur-s3-secret
  encryption:
    passwordSecretRef:
      name: kopiur-s3-secret
      namespace: kopiur-system
      key: KOPIA_PASSWORD
  create:
    enabled: true
  allowedNamespaces:
    all: true
  identityDefaults:
    hostnameExpr: namespace
    usernameExpr: namespace + '-' + policyName
  moverDefaults:
    securityContext:
      runAsUser: 1000
      runAsGroup: 1000
    podSecurityContext:
      fsGroup: 1000
      fsGroupChangePolicy: OnRootMismatch
    ttlSecondsAfterFinished: 86400
  maintenance:
    enabled: true
