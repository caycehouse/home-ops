---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mc-router
spec:
  chartRef:
    kind: OCIRepository
    name: mc-router
  interval: 1h
  values:
    image:
      repository: ghcr.io/itzg/mc-router
      tag: 1.44.1@sha256:d7caacfe1976e25e542a4c40811af6ab684f85d678f1b8e31494e73073f8d676
      pullPolicy: IfNotPresent
    minecraftRouter:
      connectionRateLimit: 10
    extraEnv:
      TZ: America/New_York
    services:
      minecraft:
        type: LoadBalancer
        annotations:
          lbipam.cilium.io/ips: 192.168.69.140
          external-dns.alpha.kubernetes.io/hostname: mc-router.thefryer.games
      extraServiceSpec:
        externalTrafficPolicy: Local
    securityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      capabilities: { drop: ["ALL"] }
    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 1000
