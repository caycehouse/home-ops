---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/monitoring.coreos.com/probe_v1.json
apiVersion: monitoring.coreos.com/v1
kind: Probe
metadata:
  name: zigbee-controller
spec:
  jobName: zigbee_controller_probe
  module: icmp
  prober:
    url: blackbox-exporter.o11y.svc.cluster.local:9115
  targets:
    staticConfig:
      static:
        - zigbee-controller.internal
  metricRelabelings:
    - targetLabel: service
      replacement: blackbox-exporter
      action: replace
