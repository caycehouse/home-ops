---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/storage.k8s.io/storageclass_v1.json
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: openebs-zfspv
  annotations:
    storageclass.kubernetes.io/is-default-class: "true"
provisioner: zfs.csi.openebs.io
parameters:
  fstype: zfs
  compression: zstd
  recordsize: 128k
  # Must match the zpool created on the node (runbook: `zpool create tank <disk>`).
  poolname: tank
allowVolumeExpansion: true
reclaimPolicy: Delete
# Single node: WaitForFirstConsumer buys no placement benefit; Immediate matches
# the prior Ceph behavior and avoids a WFFC/volume-populator edge case on restore.
volumeBindingMode: Immediate
