---
- name: Fix tailscale ingress on oracle cloud
  block:
    - name: Ensure pre-made firewall state is in place
      ansible.builtin.copy:
        src: rules.v4
        dest: /etc/iptables/
        owner: root
        group: root
        mode: 0644
    - name: Load the new firewall state
      community.general.iptables_state:
        state: restored
        path: /etc/iptables/rules.v4
      async: "{{ ansible_timeout }}"
      poll: 0
