---
- name: Install on specific node
  vars:
    install_node: "houseco-1"
  block:
    - name: Create needed dir
      when: inventory_hostname == install_node
      ansible.builtin.file:
        path: /var/data/oceanblock
        recurse: true
    - name: Deploy Stacks
      when: inventory_hostname == play_hosts[0]
      community.docker.docker_stack:
        state: present
        name: oceanblock
        compose:
          - services:
              oceanblock:
                image: itzg/minecraft-server:2023.1.0-java8-multiarch
                ports:
                  - 25565:25565
                environment:
                  EULA: "TRUE"
                  FTB_MODPACK_ID: "91"
                  FTB_MODPACK_VERSION_ID: "2245"
                  MEMORY: "4G"
                  TYPE: FTBA
                  USE_AIKAR_FLAGS: "true"
                volumes:
                  - /var/data/oceanblock:/data
                healthcheck:
                  test: mc-health
                  start_period: 5m
                  interval: 5s
                  retries: 20
                deploy:
                  mode: replicated
                  replicas: 1
                  resources:
                    limits:
                      memory: 6G
                    reservations:
                      memory: 4G
                  placement:
                    constraints:
                      - node.hostname == {{ install_node }}
          - networks:
              internal:
                driver: overlay
                driver_opts:
                  com.docker.network.driver.mtu: 1280
                ipam:
                  config:
                    - subnet: 172.16.25.0/24
