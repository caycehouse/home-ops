---
- name: Install on specific node
  vars:
    install_node: "houseco-1"
  block:
    - name: Create needed dir
      when: inventory_hostname == install_node
      ansible.builtin.file:
        path: /var/data/portainer
        recurse: true

    - name: Deploy Stacks
      when: inventory_hostname == play_hosts[0]
      community.docker.docker_stack:
        state: present
        name: portainer
        compose:
          - services:
              agent:
                image: portainer/agent:2.17.1
                volumes:
                  - /var/run/docker.sock:/var/run/docker.sock
                  - /var/lib/docker/volumes:/var/lib/docker/volumes
                networks:
                  - agent_network
                deploy:
                  mode: global
                  placement:
                    constraints: [node.platform.os == linux]
              portainer:
                image: portainer/portainer-ce:2.17.1
                command: -H tcp://tasks.agent:9001 --tlsskipverify
                ports:
                  - "9443:9443"
                  - "9000:9000"
                  - "8000:8000"
                volumes:
                  - /var/data/portainer:/data
                networks:
                  - agent_network
                deploy:
                  mode: replicated
                  replicas: 1
                  placement:
                    constraints:
                      - node.hostname == {{ install_node }}
          - networks:
              agent_network:
                driver: overlay
                attachable: true
                driver_opts:
                  com.docker.network.driver.mtu: 1280
