---
- name: Install on specific node
  vars:
    install_node: "houseco-1"
  block:
    - name: Create needed dir
      when: inventory_hostname == install_node
      ansible.builtin.file:
        path: /var/data/portainer
        recurse: true

    - name: Deploy Stacks
      when: inventory_hostname == play_hosts[0]
      community.docker.docker_stack:
        state: present
        name: portainer
        compose:
          - services:
              agent:
                image: portainer/agent:2.17.1
                volumes:
                  - /var/run/docker.sock:/var/run/docker.sock
                  - /var/lib/docker/volumes:/var/lib/docker/volumes
                networks:
                  - internal
                deploy:
                  mode: global
                  placement:
                    constraints: [node.platform.os == linux]
              portainer:
                image: portainer/portainer-ce:2.17.1
                command: -H tcp://tasks.agent:9001 --tlsskipverify
                volumes:
                  - /var/data/portainer:/data
                networks:
                  - internal
                  - traefik_public
                deploy:
                  mode: replicated
                  replicas: 1
                  labels:
                    - "traefik.docker.network=traefik_public"
                    - "traefik.http.routers.portainer.rule=Host(`portainer.caycehouse.com`)"
                    - "traefik.http.routers.portainer.entrypoints=https"
                    - "traefik.http.services.portainer.loadbalancer.server.port=9000"
                    - "traefik.enable=true"
                  placement:
                    constraints:
                      - node.hostname == {{ install_node }}
          - networks:
              traefik_public:
                external: true
              internal:
                driver: overlay
                driver_opts:
                  com.docker.network.driver.mtu: 1280
                ipam:
                  config:
                    - subnet: 172.16.13.0/24
