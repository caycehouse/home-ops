[global]
  checkNewVersion = true

[api]
  dashboard = true

[log]
  level = "INFO"
  filePath = "/traefik.log"

[entryPoints.http]
  address = ":80"

  [entryPoints.http.http.redirections.entryPoint]
    to = "https"
    scheme = "https"

[entryPoints.https]
  address = ":443"
  [entryPoints.https.http.tls]
    certResolver = "main"

[certificatesResolvers.main.acme]
  email = "cayce@caycehouse.com"
  storage = "acme.json"

  [certificatesResolvers.main.acme.dnsChallenge]
    provider = "cloudflare"

[providers.docker]
  endpoint = "unix:///var/run/docker.sock"
  swarmMode = true
  watch = true
