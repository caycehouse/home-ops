# Example usage: ansible-playbook state.yml
# This playbook deploys my whole homelab.

---

- name: Play for all machines
  hosts: all
  vars:
    tailscale_args: "--ssh"
  roles:
    - {role: common, tags: common}
    - {role: artis3n.tailscale, tags: tailscale}
  vars_files: vault.yml

- name: Play to add swap to needed machines
  hosts: all,!proxmox_servers,!klipper
  vars:
    swap_file_size_mb: '8192'
    swap_swappiness: '1'
  roles:
    - {role: geerlingguy.swap, tags: swap}

- name: Play for proxmox machines
  hosts: cupcakes
  roles:
    - {role: proxmox, tags: proxmox}

- name: Play for docker nodes
  hosts: docker_nodes
  vars:
    pip_install_packages:
      - docker
      - docker-compose
    docker_daemon_options:
      log-driver: "local"
      mtu: 1280
    docker_users:
      - caycehouse
  roles:
    - {role: geerlingguy.pip, tags: pip}
    - {role: geerlingguy.docker, tags: docker}

- name: Play for Portainer
  hosts: houseco-1
  vars:
    config_dir: '~'
  roles:
    - {role: portainer, tags: portainer}

- name: Play for Portainer agent
  hosts: docker_nodes
  roles:
    - {role: portainer-agent, tags: portainer_agent}
